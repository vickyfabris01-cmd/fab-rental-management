<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>fabRentals — Kenya's Rental Management Platform</title>
    <meta name="description" content="fabRentals — modern rental management for hostels, apartments, and student residences across Kenya." />
    <meta name="theme-color" content="#C5612C" />

    <!-- Favicon (replace with real .ico / .png in production) -->
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo-icon.svg" />

    <!-- Google Fonts — loaded here so they're available before first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:title"       content="fabRentals" />
    <meta property="og:description" content="Kenya's modern rental management platform." />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://fabrentals.co.ke" />

    <!-- Global reset: box-sizing + remove default margin/padding -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        height: 100%;
        min-height: 100dvh;
      }

      body {
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        background: #FAF7F2;
        color: #1A1412;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Thin custom scrollbar */
      ::-webkit-scrollbar         { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track   { background: transparent; }
      ::-webkit-scrollbar-thumb   { background: #E8DDD4; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #C5612C; }

      /* Remove tap highlight on mobile */
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite injects the module script tag here -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
